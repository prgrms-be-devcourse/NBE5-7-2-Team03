# application.yml (Git 포함)
spring:
  profiles:
    active: local
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  certification:
    api-key: ${UNIV_CERTIFICATION_API_KEY}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: true
        
  web:
    resources:
      static-locations: file:${user.home}/gongguri-uploads/, classpath:/static/
      
  mvc:
    static-path-pattern: /**

