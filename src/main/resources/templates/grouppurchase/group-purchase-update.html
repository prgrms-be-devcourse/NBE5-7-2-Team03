<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 수정</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase-post_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('공동구매 수정')}"></div>

        <main class="container">
            <form id="groupPurchaseForm">
                <!-- 이미지 업로드 -->
                <div class="form-section">
                    <label for="imageUpload" class="image-upload-label">
                        <img id="imagePreview" src="" alt="미리보기" />
                        <span>이미지 업로드</span>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
                    <input type="hidden" id="imageUrl" name="imageUrl" />
                </div>

                <!-- 진행 상태 -->
                <div class="form-section">
                    <label for="progressStatus">진행 상태</label>
                    <select id="progressStatus" name="progressStatus" required>
                        <option value="RECRUITING">진행중</option>
                        <option value="CLOSED">모집 마감</option>
                        <option value="COMPLETED">구매 완료</option>
                    </select>
                </div>

                <!-- 제목 -->
                <div class="form-section">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" required />
                </div>

                <!-- 가격 -->
                <div class="form-section">
                    <label for="price">가격</label>
                    <input type="number" id="price" name="price" required />
                </div>

                <!-- 은행 -->
                <div class="form-section">
                    <label for="bank">은행</label>
                    <select id="bank" name="bank" required>
                        <option value="">은행 선택</option>
                        <option value="신한">신한</option>
                        <option value="국민">국민</option>
                        <option value="우리">우리</option>
                        <option value="하나">하나</option>
                        <option value="농협">농협</option>
                        <option value="카카오뱅크">카카오뱅크</option>
                        <option value="토스뱅크">토스뱅크</option>
                    </select>
                </div>

                <!-- 계좌번호 -->
                <div class="form-section">
                    <label for="account">계좌 번호</label>
                    <input type="text" id="account" name="account" required />
                </div>

                <!-- 인원 -->
                <div class="form-section">
                    <label for="peopleCount">인원 (본인 포함)</label>
                    <div class="people-counter">
                        <button type="button" onclick="decreaseCount()">−</button>
                        <span id="count">1</span>
                        <button type="button" onclick="increaseCount()">+</button>
                        <input type="hidden" id="peopleCount" name="maxParticipants" value="1" />
                    </div>
                </div>

                <!-- 내용 -->
                <div class="form-section">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" required></textarea>
                </div>

                <!-- 수정 버튼 -->
                <div class="form-section">
                    <button type="submit" class="submit-button">수정하기</button>
                </div>
            </form>
        </main>

        <div th:replace="~{fragments/bottombar :: bottomNav('home')}"></div>
    </div>
</div>

<script>
    let count = 1;
    function increaseCount() {
        count++;
        document.getElementById("count").innerText = count;
        document.getElementById("peopleCount").value = count;
    }

    function decreaseCount() {
        if (count > 1) {
            count--;
            document.getElementById("count").innerText = count;
            document.getElementById("peopleCount").value = count;
        }
    }

    // ID 파라미터 가져오기
    const params = new URLSearchParams(location.search);
    const groupPurchaseId = params.get("id");

    // 초기값 불러오기
    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const res = await fetch(`/api/group-purchases/${groupPurchaseId}`);
            const data = await res.json();

            document.getElementById("progressStatus").value = data.progressStatus;
            document.getElementById("title").value = data.title;
            document.getElementById("price").value = data.price;
            document.getElementById("bank").value = data.bank;
            document.getElementById("account").value = data.account;
            document.getElementById("peopleCount").value = data.maxParticipants;
            document.getElementById("count").innerText = data.maxParticipants;
            document.getElementById("content").value = data.content;
            document.getElementById("imageUrl").value = data.imageUrl;
            document.getElementById("imagePreview").src = data.imageUrl;

            count = parseInt(data.maxParticipants);
        } catch (e) {
            alert("기존 데이터를 불러오는 데 실패했습니다.");
        }
    });

    // 이미지 업로드
    document.getElementById("imageUpload").addEventListener("change", async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("imagePreview").src = e.target.result;
        };
        reader.readAsDataURL(file);

        const formData = new FormData();
        formData.append("imageFile", file);

        try {
            const res = await fetch("/api/images", {
                method: "POST",
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById("imageUrl").value = data.imageUrl;
            } else {
                alert("이미지 업로드 실패");
            }
        } catch (err) {
            alert("이미지 업로드 에러: " + err.message);
        }
    });

    // 수정 제출
    document.getElementById("groupPurchaseForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const body = {

            progressStatus: document.getElementById("progressStatus").value,
            title: document.getElementById("title").value,
            price: document.getElementById("price").value,
            bank: document.getElementById("bank").value,
            account: document.getElementById("account").value,
            maxParticipants: document.getElementById("peopleCount").value,
            content: document.getElementById("content").value,
            imageUrl: document.getElementById("imageUrl").value
        };

        try {
            const res = await fetch(`/api/group-purchases/${groupPurchaseId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                alert("수정이 완료되었습니다.");
                window.location.href = "/group-purchase";
            } else {
                const errText = await res.text();
                alert("수정 실패: " + errText);
            }
        } catch (err) {
            alert("에러 발생: " + err.message);
        }
    });
</script>
</body>
</html>
