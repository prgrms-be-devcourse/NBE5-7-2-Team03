<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공동구매 게시글 테스트</title>
</head>
<body>
<h1>📦 공동구매 게시글 생성</h1>
<form id="addForm">
    <label>제목: <input type="text" name="title"></label><br>
    <label>내용: <input type="text" name="content"></label><br>
    <label>가격: <input type="number" name="price"></label><br>
    <label>모집인원: <input type="number" name="maxParticipants"></label><br>
    <label>은행: <input type="text" name="bank"></label><br>
    <label>계좌번호: <input type="text" name="account"></label><br>
    <label>진행상태 (RECRUITING): <input type="text" name="progressStatus" value="RECRUITING"></label><br>
    <label>채팅방 ID: <input type="number" name="chatRoomId" value="1"></label><br>
    <label>학교 ID: <input type="number" name="univId" value="1"></label><br>
    <button type="submit">등록</button>
</form>

<hr>

<h1>🔍 게시글 조회</h1>
<label>ID: <input type="number" id="searchId"></label>
<button onclick="getPost()">조회</button>

<pre id="responseBox"></pre>

<script>
    document.getElementById('addForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        const json = {};
        formData.forEach((v, k) => json[k] = v);

        const res = await fetch('/api/group-purchases', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(json)
        });

        const result = await res.json();
        document.getElementById('responseBox').textContent = JSON.stringify(result, null, 2);
    });

    async function getPost() {
        const id = document.getElementById('searchId').value;
        const res = await fetch(`/api/group-purchases/${id}`);
        const result = await res.json();
        document.getElementById('responseBox').textContent = JSON.stringify(result, null, 2);
    }
</script>
</body>
</html>
