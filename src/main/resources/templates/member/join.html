<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/member/join_style.css" />
  <title>회원가입</title>
</head>

<body>
<div class="join-content">
  <form class="join-form" th:action="@{/join}" method="post">
    <div class="join-title">회원가입</div>
    <br>

    <div class="error-message" th:if="${errorMessage}">
      <p th:text="${errorMessage}"></p>
    </div>

    <div>
      <label for="email">학교 이메일</label>
      <input class="join-control" type="email" name="email" id="email" required>
    </div>

    <div class="row">
      <label for="univName">학교 이름</label>
      <input type="text" id="univName" name="univName" placeholder="학교 이름" required />
      <button type="button" id="send-code-btn" class="inline-button">인증번호 발송</button>
    </div>

    <div class="row">
      <label for="verification-code">인증 코드</label>
      <input type="text" id="verification-code" name="verificationCode" placeholder="이메일로 받은 인증 코드" required />
      <button type="button" id="verify-code-btn" class="inline-button">인증 확인</button>
    </div>

    <div id="verification-result" style="color: green;"></div>

    <input type="hidden" name="verified" id="verified" th:value="${verified}" />

    <div>
      <label for="nickname">닉네임</label>
      <input class="join-control" type="text" name="nickname" id="nickname" required>
    </div>

    <div>
      <label for="password">비밀번호</label>
      <input class="join-control" type="password" name="password" id="password" required>
    </div>

    <button class="join-button" type="submit">회원가입</button>

    <button class="login-button" type="button" onclick="location.href='/login'">
      로그인으로 돌아가기
    </button>
  </form>
</div>

<script src="/js/verify.js"></script>

</body>
</html>
