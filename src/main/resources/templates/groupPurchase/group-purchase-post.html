<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공동구매 작성</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase-post_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('공동구매 작성')}"></div>

        <main class="container">
            <form id="groupPurchaseForm">
                <!-- 이미지 업로드 -->
                <div class="form-section">
                    <label for="imageUpload" class="image-upload-label">
                        <img id="imagePreview" src="" alt="미리보기" />
                        <span>이미지 업로드</span>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
                    <input type="hidden" id="imageUrl" name="imageUrl" />
                </div>

                <!-- 제목 -->
                <div class="form-section">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" placeholder="제목" required />
                </div>

                <!-- 가격 -->
                <div class="form-section">
                    <label for="price">가격</label>
                    <input type="number" id="price" name="price" placeholder="₩ 1인당 가격을 입력해주세요." required />
                </div>

                <!-- 은행 선택 -->
                <div class="form-section">
                    <label for="bank">은행</label>
                    <select id="bank" name="bank" required>
                        <option value="">은행 선택</option>
                        <option value="신한">신한</option>
                        <option value="국민">국민</option>
                        <option value="우리">우리</option>
                        <option value="하나">하나</option>
                        <option value="농협">농협</option>
                        <option value="카카오뱅크">카카오뱅크</option>
                        <option value="토스뱅크">토스뱅크</option>
                    </select>
                </div>

                <!-- 계좌번호 -->
                <div class="form-section">
                    <label for="account">계좌 번호</label>
                    <input type="text" id="account" name="account" placeholder="계좌 번호" required />
                </div>

                <!-- 인원 -->
                <div class="form-section">
                    <label for="peopleCount">인원 <span style="font-size: 0.85em;">(본인 포함)</span></label>
                    <div class="people-counter">
                        <button type="button" onclick="decreaseCount()">−</button>
                        <span id="count">1</span>
                        <button type="button" onclick="increaseCount()">+</button>
                        <input type="hidden" id="peopleCount" name="maxParticipants" value="1" />
                    </div>
                </div>

                <!-- 내용 -->
                <div class="form-section">
                    <label for="content">내용</label>
                    <textarea id="content" name="content" placeholder="내용을 입력하세요." required></textarea>
                </div>

                <!-- 작성 버튼 -->
                <div class="form-section">
                    <button type="submit" class="submit-button">작성하기</button>
                </div>
            </form>
        </main>

        <div th:replace="~{fragments/bottombar :: bottomNav('home')}"></div>
    </div>
</div>

<script>
    let count = 1;
    function increaseCount() {
        count++;
        document.getElementById("count").innerText = count;
        document.getElementById("peopleCount").value = count;
    }

    function decreaseCount() {
        if (count > 1) {
            count--;
            document.getElementById("count").innerText = count;
            document.getElementById("peopleCount").value = count;
        }
    }

    // 이미지 업로드 → 서버로 전송 후 URL 저장
    document.getElementById("imageUpload").addEventListener("change", async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("imagePreview").src = e.target.result;
        };
        reader.readAsDataURL(file);

        const formData = new FormData();
        formData.append("imageFile", file);

        try {
            const res = await fetch("/api/images", {
                method: "POST",
                body: formData,
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById("imageUrl").value = data.imageUrl;
                console.log("이미지 업로드 성공:", data.imageUrl);
            } else {
                const error = await res.text();
                alert("이미지 업로드 실패: " + error);
            }
        } catch (err) {
            alert("이미지 업로드 중 에러: " + err.message);
        }
    });

    // 게시글 작성 요청 (JSON 방식)
    document.getElementById("groupPurchaseForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const body = {
            title: document.getElementById("title").value,
            price: document.getElementById("price").value,
            bank: document.getElementById("bank").value,
            account: document.getElementById("account").value,
            maxParticipants: document.getElementById("peopleCount").value,
            content: document.getElementById("content").value,
            imageUrl: document.getElementById("imageUrl").value
        };

        try {
            const res = await fetch("/api/group-purchases", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body),
            });

            if (res.ok) {
                window.location.href = "/group-purchase";
            } else {
                const errorText = await res.text();
                alert("등록 실패: " + errorText);
            }
        } catch (err) {
            alert("에러 발생: " + err.message);
        }
    });
</script>
</body>
</html>
