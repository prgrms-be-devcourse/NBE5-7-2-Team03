<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공동구매 작성</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase-post_style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">
        <div th:replace="~{fragments/topbar :: topBar('공동구매 작성')}"></div>

        <main class="container">
            <form id="groupPurchaseForm">
                <!-- 이미지 업로드 -->
                <div class="form-section">
                    <label for="imageUpload" class="image-upload-label">
                        <img src="/images/camera-icon.png" alt="카메라" />
                        <span>이미지 업로드</span>
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
                </div>

                <!-- 제목 -->
                <div class="form-section">
                    <label for="title">제목</label>
                    <input type="text" id="title" placeholder="제목" required />
                </div>

                <!-- 가격 -->
                <div class="form-section">
                    <label for="price">가격</label>
                    <input type="number" id="price" placeholder="₩ 1인당 가격을 입력해주세요." required />
                </div>

                <!-- 은행 선택 -->
                <div class="form-section">
                    <label for="bank">은행</label>
                    <select id="bank" required>
                        <option value="">은행 선택</option>
                        <option value="신한">신한</option>
                        <option value="국민">국민</option>
                        <option value="우리">우리</option>
                        <option value="하나">하나</option>
                        <option value="농협">농협</option>
                        <option value="카카오뱅크">카카오뱅크</option>
                        <option value="토스뱅크">토스뱅크</option>
                    </select>
                </div>

                <!-- 계좌번호 -->
                <div class="form-section">
                    <label for="account">계좌 번호</label>
                    <input type="text" id="account" placeholder="계좌 번호" required />
                </div>

                <!-- 인원 -->
                <div class="form-section">
                    <label for="peopleCount">인원 <span style="font-size: 0.85em;">(본인 포함)</span></label>
                    <div class="people-counter">
                        <button type="button" onclick="decreaseCount()">−</button>
                        <span id="count">1</span>
                        <button type="button" onclick="increaseCount()">+</button>
                        <input type="hidden" id="peopleCount" value="1" />
                    </div>
                </div>

                <!-- 내용 -->
                <div class="form-section">
                    <label for="content">내용</label>
                    <textarea id="content" placeholder="내용을 입력하세요." required></textarea>
                </div>

                <!-- 작성 버튼 -->
                <div class="form-section">
                    <button type="submit" class="submit-button">작성하기</button>
                </div>
            </form>
        </main>


        <div th:replace="~{fragments/bottombar :: bottomNav('home')}"></div>
    </div>
</div>

<script>
    let count = 1;
    function increaseCount() {
        count++;
        document.getElementById("count").innerText = count;
        document.getElementById("peopleCount").value = count;
    }

    function decreaseCount() {
        if (count > 1) {
            count--;
            document.getElementById("count").innerText = count;
            document.getElementById("peopleCount").value = count;
        }
    }

    document.getElementById("groupPurchaseForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const requestData = {
            title: document.getElementById("title").value,
            price: parseInt(document.getElementById("price").value),
            account: document.getElementById("account").value,
            content: document.getElementById("content").value,
            peopleCount: parseInt(document.getElementById("peopleCount").value)
        };

        try {
            const res = await fetch("/api/group-purchases", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestData)
            });

            if (res.ok) {
                const result = await res.json(); // { id: 123 }
                await uploadImage(result.id);
                window.location.href = "/groupPurchase"; // 목록으로
            } else {
                const err = await res.text();
                alert("등록 실패: " + err);
            }
        } catch (err) {
            alert("에러 발생: " + err.message);
        }
    });

    async function uploadImage(groupPurchaseId) {
        const file = document.getElementById("imageUpload").files[0];
        if (!file) return;

        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = async () => {
                const imageBase64 = reader.result;

                const response = await fetch(`/api/group-purchases/${groupPurchaseId}/image`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ imageBase64 })
                });

                if (!response.ok) {
                    const msg = await response.text();
                    alert("이미지 업로드 실패: " + msg);
                }

                resolve();
            };
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
