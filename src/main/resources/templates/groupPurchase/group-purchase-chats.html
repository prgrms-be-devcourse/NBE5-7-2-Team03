<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Purchase Test</title>

  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase-chat.css}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div th:replace="~{fragments/layout :: mobileContainer}">
  <div th:fragment="content">

    <div th:replace="~{fragments/topbar :: topBar('채팅 목록')}"></div>

    <main class="container">
      <!-- 상태 필터 -->
      <div class="status-filter">
        <button class="filter-btn selected" onclick="filterStatus('ALL')">전체</button>
        <button class="filter-btn" onclick="filterStatus('OPEN')">진행중</button>
        <button class="filter-btn" onclick="filterStatus('DONE')">완료</button>
      </div>

      <!-- 카드 리스트 -->
      <div id="groupPurchaseList" class="purchase-list"></div>

    </main>

    <!-- ✅ Bottom Bar 유지 -->
    <div th:replace="~{fragments/bottombar :: bottomNav('chat')}"></div>
  </div>
</div>

<script>
  function renderCard(item) {
    const statusClass = item.progressStatus === 'OPEN' ? 'status-open' : 'status-done';

    return `
      <a href="/groupPurchase/${item.id}/chat" class="purchase-card">
        <img src="${item.imageUrl || 'https://via.placeholder.com/110x90'}" alt="item">
        <div class="purchase-info">
          <div class="purchase-header">
            <span class="purchase-title">${item.title}</span>
            <span><strong>${item.createAt ? new Date(item.createAt).toLocaleDateString() : ''}</strong></span>
          </div>
          <div class="purchase-message">${item.chatMessage || 'No message'}</div>
          <div class="purchase-footer">
            <span>👥 ${item.participantCount || 0}/${item.maxParticipants}</span>
            <span class="status-badge ${statusClass}">${item.progressStatus}</span>
          </div>
        </div>
      </a>`;
  }

  // Global variables
  let lastCursorId = null;
  let currentStatus = 'ALL';
  const pageSize = 10;
  let isLoading = false;

  // Fetch data from API
  function fetchGroupPurchases(cursorId = null, status = 'ALL', size = 10) {
    let url = '/api/group-purchases/chat?size=' + size;

    if (cursorId) {
      url += '&cursor=' + cursorId;
    }

    if (status !== 'ALL') {
      url += '&progressStatus=' + status;
    }

    return fetch(url)
    .then(response => {
      if (!response.ok) {
        throw new Error('Network response was not ok');
      }
      return response.json();
    })
    .catch(error => {
      console.error('Error fetching group purchases:', error);
      return [];
    });
  }

  // Load initial data
  function loadInitialData(status = 'ALL') {
    if (isLoading) return;

    isLoading = true;
    const list = document.getElementById('groupPurchaseList');
    list.innerHTML = '<div class="loading">Loading...</div>';

    currentStatus = status;
    lastCursorId = null;

    fetchGroupPurchases(null, status, pageSize)
    .then(data => {
      if (data.length > 0) {
        const cards = data.map(renderCard).join('');
        list.innerHTML = cards;

        // Update the cursor for pagination
        lastCursorId = data[data.length - 1].id;
      } else {
        list.innerHTML = '<div class="no-results">No group purchases found</div>';
      }
      isLoading = false;
    });
  }

  // Load more data when scrolling
  function loadMoreData() {
    if (isLoading || !lastCursorId) return;

    isLoading = true;
    const loadingIndicator = document.createElement('div');
    loadingIndicator.className = 'loading-more';
    loadingIndicator.innerText = 'Loading more...';
    document.getElementById('groupPurchaseList').appendChild(loadingIndicator);

    fetchGroupPurchases(lastCursorId, currentStatus, pageSize)
    .then(data => {
      // Remove loading indicator
      document.querySelector('.loading-more').remove();

      if (data.length > 0) {
        const list = document.getElementById('groupPurchaseList');
        const newCards = data.map(renderCard).join('');
        list.insertAdjacentHTML('beforeend', newCards);

        // Update the cursor for next pagination
        lastCursorId = data[data.length - 1].id;
      }
      isLoading = false;
    });
  }

  // Filter by status
  function filterStatus(status) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('selected'));
    if (status === 'ALL') document.querySelector('.filter-btn[data-status="ALL"]').classList.add('selected');
    if (status === 'OPEN') document.querySelector('.filter-btn[data-status="OPEN"]').classList.add('selected');
    if (status === 'DONE') document.querySelector('.filter-btn[data-status="DONE"]').classList.add('selected');

    loadInitialData(status);
  }

  // Navigate to add page
  function goToAdd() {
    window.location.href = "/groupPurchase/post";
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    loadInitialData();

    // Add scroll event listener for infinite scrolling
    window.addEventListener('scroll', () => {
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
        loadMoreData();
      }
    });
  });

</script>

</body>
</html>
