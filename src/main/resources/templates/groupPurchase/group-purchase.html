<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Purchase Test</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- ✅ layout.html 구조 유지 -->
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">

        <!-- ✅ Top Bar 유지 -->
        <div th:replace="~{fragments/topbar :: topBar('공동구매')}"></div>

        <main class="container" style="position: relative;">

            <!-- 중앙정렬 학교명 -->
            <div class="top-search-filter">
                <span class="school-name">3소대학교</span>
            </div>

            <!-- 상태 필터 -->
            <div class="status-filter">
                <button class="filter-btn selected" onclick="filterStatus('ALL')">전체</button>
                <button class="filter-btn" onclick="filterStatus('OPEN')">진행중</button>
                <button class="filter-btn" onclick="filterStatus('DONE')">완료</button>
            </div>

            <!-- 카드 리스트 -->
            <div id="groupPurchaseList" class="purchase-list"></div>

        </main>

        <!-- ✅ Bottom Bar 유지 -->
        <div th:replace="~{fragments/bottombar :: bottomNav('groupPurchase')}"></div>
    </div>
</div>

<!-- ➕ 추가 버튼 -->
<button class="add-btn" onclick="goToAdd()">＋</button>

<script>
    const apiUrl = '/api/group-purchases';

    function getStatusLabel(status) {
        switch (status) {
            case "RECRUITING":
                return "진행중";
            case "CLOSED":
                return "모집 마감";
            case "COMPLETED":
                return "구매 완료"
            default:
                return "알수없음";
        }
    }

    function renderCard(item) {
        const statusClass = item.progressStatus === 'OPEN' ? 'status-open' : 'status-done';

        return `
      <a href="/group-purchase/${item.id}" class="purchase-card">
        <img src="${item.imageUrl || 'https://via.placeholder.com/110x90'}" alt="item">
        <div class="purchase-info">
          <div class="purchase-title">${item.title}</div>
          <div class="purchase-footer">
            <span>${item.currentParticipants || 0}/${item.maxParticipants}</span>
            <span class="status-badge ${statusClass}">${getStatusLabel(item.progressStatus)}</span>
            <span><strong>₩${item.price.toLocaleString()}</strong></span>
          </div>
        </div>
      </a>`;
    }

    let cursor = null;
    let isLast = false;
    let isLoading = false;
    let currentStatus = 'ALL';

    async function fetchGroupPurchases(status = 'ALL', size = 10) {
        if (isLast || isLoading) return;

        isLoading = true;
        const list = document.getElementById('groupPurchaseList');

        const url = new URL('/api/group-purchases/cursor', window.location.origin);
        if (cursor) url.searchParams.append('cursor', cursor);
        if (status !== 'ALL') url.searchParams.append('progressStatus', status);
        url.searchParams.append('size', size);

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('데이터 불러오기 실패');

            const data = await res.json();

            // 다음 커서 갱신
            if (data.length < size) isLast = true;
            if (data.length > 0) cursor = data[data.length - 1].id;

            // 카드 추가
            list.insertAdjacentHTML('beforeend', data.map(renderCard).join(''));
        } catch (e) {
            console.error(e);
        } finally {
            isLoading = false;
        }
    }

    function filterStatus(status) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('selected'));
        if (status === 'ALL') document.querySelectorAll('.filter-btn')[0].classList.add('selected');
        if (status === 'OPEN') document.querySelectorAll('.filter-btn')[1].classList.add('selected');
        if (status === 'DONE') document.querySelectorAll('.filter-btn')[2].classList.add('selected');

        currentStatus = status === 'OPEN' ? 'RECRUITING' : status === 'DONE' ? 'COMPLETED' : 'ALL';
        cursor = null;
        isLast = false;
        document.getElementById('groupPurchaseList').innerHTML = '';
        fetchGroupPurchases(currentStatus);
    }

    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
            fetchGroupPurchases(currentStatus);
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        fetchGroupPurchases(); // 최초 로딩
    });


    function goToAdd() {
        window.location.href = "/group-purchase/post";
    }

</script>

</body>
</html>
