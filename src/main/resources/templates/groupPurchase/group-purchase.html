<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Purchase Test</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/groupPurchase/group-purchase_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- ✅ layout.html 구조 유지 -->
<div th:replace="~{fragments/layout :: mobileContainer}">
    <div th:fragment="content">

        <!-- ✅ Top Bar 유지 -->
        <div th:replace="~{fragments/topbar :: topBar('공동구매')}"></div>

        <main class="container" style="position: relative;">

            <!-- 중앙정렬 학교명 -->
            <div class="top-search-filter">
                <span class="school-name">3소대학교</span>
            </div>

            <!-- 상태 필터 -->
            <div class="status-filter">
                <button class="filter-btn selected" onclick="filterStatus('ALL')">전체</button>
                <button class="filter-btn" onclick="filterStatus('OPEN')">진행중</button>
                <button class="filter-btn" onclick="filterStatus('DONE')">완료</button>
            </div>

            <!-- 카드 리스트 -->
            <div id="groupPurchaseList" class="purchase-list"></div>

        </main>

        <!-- ✅ Bottom Bar 유지 -->
        <div th:replace="~{fragments/bottombar :: bottomNav('groupPurchase')}"></div>
    </div>
</div>

<!-- ➕ 추가 버튼 -->
<button class="add-btn" onclick="goToAdd()">＋</button>

<script>
    const apiUrl = '/api/group-purchases';

    function renderCard(item) {
        const statusClass = item.progressStatus === 'OPEN' ? 'status-open' : 'status-done';

        return `
      <a href="/groupPurchase/${item.id}" class="purchase-card">
        <img src="${item.imageUrl || 'https://via.placeholder.com/110x90'}" alt="item">
        <div class="purchase-info">
          <div class="purchase-title">${item.title}</div>
          <div class="purchase-footer">
            <span>👥 ${item.currentParticipants || 0}/${item.maxParticipants}</span>
            <span class="status-badge ${statusClass}">${item.progressStatus}</span>
            <span><strong>₩${item.price.toLocaleString()}</strong></span>
          </div>
        </div>
      </a>`;
    }

    async function fetchAndRender(status = 'ALL') {
        const res = await fetch(apiUrl);
        const data = await res.json();
        const list = document.getElementById('groupPurchaseList');

        let filtered = data;
        if (status !== 'ALL') {
            filtered = data.filter(item => item.progressStatus === status);
        }

        list.innerHTML = filtered.map(renderCard).join('');
    }

    function filterStatus(status) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('selected'));
        if (status === 'ALL') document.querySelectorAll('.filter-btn')[0].classList.add('selected');
        if (status === 'OPEN') document.querySelectorAll('.filter-btn')[1].classList.add('selected');
        if (status === 'DONE') document.querySelectorAll('.filter-btn')[2].classList.add('selected');
        fetchAndRender(status);
    }

    function goToAdd() {
        window.location.href = "/groupPurchase/post";
    }

    fetchAndRender();
</script>

</body>
</html>
